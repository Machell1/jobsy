<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | Jobsy Jamaica</title>
  <meta name="description" content="Chat with your matches on Jobsy Jamaica.">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://api.jobsyja.com https://*.up.railway.app http://localhost:8000 wss://api.jobsyja.com wss://*.up.railway.app ws://localhost:8000 https://chat.stream-io-api.com wss://chat.stream-io-api.com; frame-src 'none'">
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: 500px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .convo-list { border-right: 1px solid var(--border); overflow-y: auto; max-height: 600px; }
    .convo-item { padding: 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .convo-item:hover, .convo-item.active { background: var(--primary-light); }
    .convo-item h4 { margin: 0 0 0.25rem; font-size: 0.95rem; }
    .convo-item p { margin: 0; color: var(--text-light); font-size: 0.8rem; }
    .chat-panel { display: flex; flex-direction: column; }
    .chat-header { padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600; background: var(--bg-alt); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; max-height: 420px; display: flex; flex-direction: column; gap: 0.5rem; }
    .msg { max-width: 75%; padding: 0.6rem 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
    .msg-sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .msg-received { align-self: flex-start; background: var(--bg-alt); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 0.7rem; color: var(--text-light); margin-top: 0.15rem; }
    .msg-sent .msg-time { color: rgba(255,255,255,0.7); }
    .chat-input { display: flex; border-top: 1px solid var(--border); }
    .chat-input input { flex: 1; border: none; padding: 0.75rem 1rem; font-size: 0.95rem; outline: none; }
    .chat-input button { padding: 0.75rem 1.25rem; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; }
    .chat-input button:hover { background: var(--primary-dark); }
    .chat-empty { display: flex; align-items: center; justify-content: center; color: var(--text-light); padding: 2rem; text-align: center; }
    @media (max-width: 700px) {
      .chat-layout { grid-template-columns: 1fr; }
      .convo-list { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      .chat-messages { max-height: 300px; }
    }
  </style>
</head>
<body>
  <main id="main-content">
    <div class="container">
      <div class="breadcrumbs">
        <a href="dashboard.html">Dashboard</a> <span>&rsaquo;</span> <span>Messages</span>
      </div>

      <h1>Messages</h1>

      <div id="msg-loading" style="text-align:center;padding:2rem">
        <p class="text-muted">Loading conversations...</p>
      </div>

      <div id="msg-login" style="display:none;text-align:center;padding:3rem">
        <p class="text-muted">Please <a href="login.html">log in</a> to view your messages.</p>
      </div>

      <div id="msg-empty" style="display:none;text-align:center;padding:3rem">
        <p class="text-muted">No conversations yet. When you get matched with a provider or customer, you can chat here.</p>
        <a href="index.html" class="btn btn-outline" style="margin-top:1rem">Browse Services</a>
      </div>

      <div class="chat-layout" id="chat-layout" style="display:none">
        <div class="convo-list" id="convo-list"></div>
        <div class="chat-panel" id="chat-panel">
          <div class="chat-empty" id="chat-placeholder">
            <p>Select a conversation to start chatting</p>
          </div>
          <div id="chat-active" style="display:none">
            <div class="chat-header" id="chat-header">Chat</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input">
              <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
              <button id="chat-send">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/stream-chat@8/dist/browser.full-bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!isLoggedIn()) {
        document.getElementById('msg-loading').style.display = 'none';
        document.getElementById('msg-login').style.display = '';
        return;
      }

      // Get current user ID from JWT
      const jwtToken = getAuthToken();
      let currentUserId = '';
      try {
        const payload = JSON.parse(atob(jwtToken.split('.')[1]));
        currentUserId = payload.sub;
      } catch { window.location.href = 'login.html'; return; }

      let activeChannel = null;

      // Initialize Stream Chat
      let streamClient = null;
      try {
        const streamData = await StreamChatManager.fetchToken();
        streamClient = StreamChatManager.init(streamData.api_key);
        await StreamChatManager.connectUser(streamClient, streamData.user_id, streamData.token);
      } catch (err) {
        console.error('Stream Chat init failed:', err);
        document.getElementById('msg-loading').style.display = 'none';
        document.getElementById('msg-empty').style.display = '';
        return;
      }

      // Load channels the user belongs to
      let channels = [];
      try {
        channels = await StreamChatManager.listChannels(streamClient, currentUserId);
      } catch {
        channels = [];
      }

      document.getElementById('msg-loading').style.display = 'none';

      if (channels.length === 0) {
        document.getElementById('msg-empty').style.display = '';
        return;
      }

      document.getElementById('chat-layout').style.display = '';

      // Render conversation list from Stream channels
      const convoList = document.getElementById('convo-list');
      convoList.innerHTML = channels.map((ch, idx) => {
        const members = Object.values(ch.state.members || {});
        const other = members.find(m => m.user_id !== currentUserId);
        const name = other?.user?.name || other?.user_id?.slice(0, 8) || `Chat ${idx + 1}`;
        const lastMsg = ch.state.messages?.length
          ? ch.state.messages[ch.state.messages.length - 1]
          : null;
        const date = lastMsg
          ? new Date(lastMsg.created_at).toLocaleDateString()
          : '';
        return `<div class="convo-item" data-cid="${ch.id}" data-idx="${idx}">
          <h4>${escapeHtml(name)}</h4>
          <p>${date ? 'Last message ' + date : 'No messages yet'}</p>
        </div>`;
      }).join('');

      // Click handler for conversations
      convoList.addEventListener('click', async (e) => {
        const item = e.target.closest('.convo-item');
        if (!item) return;
        convoList.querySelectorAll('.convo-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const idx = parseInt(item.dataset.idx, 10);
        await openChannel(channels[idx]);
      });

      async function openChannel(channel) {
        // Stop listening on previous channel
        if (activeChannel) {
          activeChannel.off('message.new');
        }

        activeChannel = channel;
        const chatPlaceholder = document.getElementById('chat-placeholder');
        const chatActive = document.getElementById('chat-active');
        chatPlaceholder.style.display = 'none';
        chatActive.style.display = 'flex';
        chatActive.style.flexDirection = 'column';
        chatActive.style.height = '100%';

        const members = Object.values(channel.state.members || {});
        const other = members.find(m => m.user_id !== currentUserId);
        const name = other?.user?.name || other?.user_id?.slice(0, 8) || 'Chat';
        document.getElementById('chat-header').textContent = name;

        const messagesEl = document.getElementById('chat-messages');
        messagesEl.innerHTML = '<p class="text-muted" style="text-align:center">Loading messages...</p>';

        try {
          await StreamChatManager.watchChannel(channel);
          renderMessages(channel.state.messages || []);
          await channel.markRead();
        } catch {
          messagesEl.innerHTML = '<p class="text-muted" style="text-align:center">Could not load messages.</p>';
          return;
        }

        // Listen for new messages in real-time
        channel.on('message.new', (event) => {
          if (event.message) {
            addMessage(event.message);
          }
        });
      }

      function renderMessages(messages) {
        const messagesEl = document.getElementById('chat-messages');
        if (!messages || messages.length === 0) {
          messagesEl.innerHTML = '<p class="text-muted" style="text-align:center">No messages yet. Say hello!</p>';
          return;
        }
        messagesEl.innerHTML = messages.map(m => {
          const isSent = m.user?.id === currentUserId;
          const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          return `<div class="msg ${isSent ? 'msg-sent' : 'msg-received'}">
            <div>${escapeHtml(m.text || '')}</div>
            <div class="msg-time">${time}</div>
          </div>`;
        }).join('');
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addMessage(msg) {
        const messagesEl = document.getElementById('chat-messages');
        const placeholder = messagesEl.querySelector('.text-muted');
        if (placeholder) placeholder.remove();

        const isSent = msg.user?.id === currentUserId;
        const time = new Date(msg.created_at || new Date()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg ${isSent ? 'msg-sent' : 'msg-received'}`;
        div.innerHTML = `<div>${escapeHtml(msg.text || '')}</div><div class="msg-time">${time}</div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // Send message via Stream
      async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !activeChannel) return;

        input.value = '';
        try {
          await StreamChatManager.sendMessage(activeChannel, text);
        } catch (err) {
          console.error('Failed to send message:', err);
        }
      }

      document.getElementById('chat-send').addEventListener('click', sendMessage);
      document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
      });

      // Auto-open if channel ID in URL
      const urlParams = new URLSearchParams(window.location.search);
      const autoOpen = urlParams.get('convo') || urlParams.get('channel');
      if (autoOpen) {
        const item = convoList.querySelector(`[data-cid="${autoOpen}"]`);
        if (item) item.click();
      }
    });
  </script>
</body>
</html>
