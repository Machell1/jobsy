<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing | Jobsy Jamaica</title>
  <meta name="description" content="Create or edit a service listing on Jobsy Jamaica.">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://api.jobsyja.com http://localhost:8000; frame-src 'none'">
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content">
    <div class="container">
      <div class="breadcrumbs">
        <a href="dashboard.html">Dashboard</a> <span>&rsaquo;</span> <span id="breadcrumb-title">Create Listing</span>
      </div>
      <div class="service-detail" style="max-width:700px">
        <h1 id="page-title">Create a New Listing</h1>
        <p class="text-muted">Describe the service you offer so customers can find you.</p>

        <div id="form-message" style="display:none"></div>

        <form id="listing-form" novalidate>
          <div class="form-group">
            <label for="lst-title">Title *</label>
            <input type="text" id="lst-title" required placeholder="e.g. Professional Plumbing Services" maxlength="200">
          </div>

          <div class="form-group">
            <label for="lst-description">Description *</label>
            <textarea id="lst-description" required placeholder="Describe what you offer, your experience, service area, etc." rows="5"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="lst-category">Category *</label>
              <select id="lst-category" required>
                <option value="">Select a category</option>
              </select>
            </div>
            <div class="form-group">
              <label for="lst-parish">Parish *</label>
              <select id="lst-parish" required>
                <option value="">Select parish</option>
                <option>Kingston</option>
                <option>St. Andrew</option>
                <option>St. Thomas</option>
                <option>Portland</option>
                <option>St. Mary</option>
                <option>St. Ann</option>
                <option>Trelawny</option>
                <option>St. James</option>
                <option>Hanover</option>
                <option>Westmoreland</option>
                <option>St. Elizabeth</option>
                <option>Manchester</option>
                <option>Clarendon</option>
                <option>St. Catherine</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="lst-budget-min">Min Budget (JMD)</label>
              <input type="number" id="lst-budget-min" placeholder="e.g. 5000" min="0">
            </div>
            <div class="form-group">
              <label for="lst-budget-max">Max Budget (JMD)</label>
              <input type="number" id="lst-budget-max" placeholder="e.g. 25000" min="0">
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="lst-submit" style="width:100%;justify-content:center">
            Create Listing
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!isLoggedIn()) { window.location.href = 'login.html'; return; }

      // Populate categories
      const catSelect = document.getElementById('lst-category');
      CATEGORIES.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.name;
        opt.textContent = c.name;
        catSelect.appendChild(opt);
      });

      const params = new URLSearchParams(window.location.search);
      const editId = params.get('edit');
      const msgEl = document.getElementById('form-message');
      let isEdit = false;

      // Edit mode: pre-populate form
      if (editId) {
        isEdit = true;
        document.getElementById('page-title').textContent = 'Edit Listing';
        document.getElementById('breadcrumb-title').textContent = 'Edit Listing';
        document.getElementById('lst-submit').textContent = 'Save Changes';
        try {
          const listing = await api.fetchListing(editId);
          document.getElementById('lst-title').value = listing.title || '';
          document.getElementById('lst-description').value = listing.description || '';
          document.getElementById('lst-category').value = listing.category || '';
          document.getElementById('lst-parish').value = listing.parish || '';
          document.getElementById('lst-budget-min').value = listing.budget_min || '';
          document.getElementById('lst-budget-max').value = listing.budget_max || '';
        } catch {
          showMessage('Could not load listing details.', 'error');
        }
      }

      // Form submit
      document.getElementById('listing-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        msgEl.style.display = 'none';

        const title = document.getElementById('lst-title').value.trim();
        const description = document.getElementById('lst-description').value.trim();
        const category = document.getElementById('lst-category').value;
        const parish = document.getElementById('lst-parish').value;
        const budgetMin = document.getElementById('lst-budget-min').value;
        const budgetMax = document.getElementById('lst-budget-max').value;

        if (!title || !description || !category || !parish) {
          showMessage('Please fill in all required fields.', 'error');
          return;
        }

        const data = {
          title,
          description,
          category,
          parish,
          budget_min: budgetMin ? Number(budgetMin) : undefined,
          budget_max: budgetMax ? Number(budgetMax) : undefined,
        };

        const btn = document.getElementById('lst-submit');
        btn.disabled = true;
        btn.textContent = isEdit ? 'Saving...' : 'Creating...';

        try {
          if (isEdit) {
            await api.updateListing(editId, data);
            showMessage('Listing updated!', 'success');
          } else {
            await api.createListing(data);
            showMessage('Listing created! Redirecting...', 'success');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
          }
        } catch (err) {
          showMessage(err.message || 'Failed to save listing.', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = isEdit ? 'Save Changes' : 'Create Listing';
        }
      });

      function showMessage(text, type) {
        msgEl.textContent = text;
        msgEl.className = 'form-message ' + type;
        msgEl.style.display = 'block';
        msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  </script>
</body>
</html>
