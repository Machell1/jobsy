name: Test

on:
  push:
    branches: [main]
    paths: ["jobsy/**"]
  pull_request:
    branches: [main]
    paths: ["jobsy/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobsy

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: jobsy_test
          POSTGRES_USER: jobsy
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://jobsy:testpass@localhost:5432/jobsy_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      JWT_SECRET: test-secret-key
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: jobsy/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Run linter
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: |
          pytest --tb=short -q

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing --tb=short -q
