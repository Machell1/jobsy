name: Deploy

on:
  push:
    branches: [main]
    paths: ["jobsy/**"]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: cd jobsy && railway up --detach --service gateway

      - name: Wait for deployment
        run: sleep 30

      - name: Run database migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          pip install sqlalchemy[asyncio] asyncpg
          cd jobsy && railway run --service gateway python gateway/migrate.py

      - name: Verify deployment
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.jobsyja.com/health 2>/dev/null || echo "000" )
            if [ "$STATUS" = "200" ]; then
              echo "Deployment healthy!"
              exit 0
            fi
            echo "Health check attempt $i returned $STATUS, retrying..."
            sleep 10
          done
          echo "Warning: Health check did not return 200 - check Railway logs"
