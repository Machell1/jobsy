name: Mobile

on:
  push:
    branches: [main]
    paths: ["jobsy/mobile/**"]
  pull_request:
    branches: [main]
    paths: ["jobsy/mobile/**"]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobsy/mobile

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: jobsy/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0
