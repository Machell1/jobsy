name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:unit -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 5

  e2e:
    name: E2E Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5

  lighthouse:
    name: Lighthouse CI
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  bundle-check:
    name: Bundle Size Check
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and capture bundle size (PR)
        run: |
          cd apps/web
          npx next build
          du -sb .next | awk '{print $1}' > /tmp/bundle-size-pr.txt

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          clean: false

      - name: Install base dependencies
        run: npm ci

      - name: Build and capture bundle size (base)
        run: |
          cd apps/web
          npx next build
          du -sb .next | awk '{print $1}' > /tmp/bundle-size-base.txt

      - name: Compare bundle sizes
        run: |
          PR_SIZE=$(cat /tmp/bundle-size-pr.txt)
          BASE_SIZE=$(cat /tmp/bundle-size-base.txt)
          DELTA=$((PR_SIZE - BASE_SIZE))
          DELTA_KB=$((DELTA / 1024))
          echo "## Bundle Size Delta" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Base | $((BASE_SIZE / 1024)) KB |" >> $GITHUB_STEP_SUMMARY
          echo "| PR | $((PR_SIZE / 1024)) KB |" >> $GITHUB_STEP_SUMMARY
          echo "| Delta | ${DELTA_KB} KB |" >> $GITHUB_STEP_SUMMARY
          if [ "$DELTA_KB" -gt 50 ]; then
            echo "::warning::Bundle size increased by ${DELTA_KB}KB (threshold: 50KB)"
          fi
