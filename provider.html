<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Provider | Jobsy - Jamaica's Service Marketplace</title>
  <meta name="description" content="View service provider details, listings, and reviews on Jobsy Jamaica.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Jobsy">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <div class="container">
      <div class="breadcrumbs">
        <a href="index.html">Home</a> <span>&rsaquo;</span> <span id="breadcrumb-title">Service</span>
      </div>

      <div class="tool-detail" id="provider-detail">
        <p class="text-center text-muted" style="padding:3rem">Loading service details...</p>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const listingId = params.get('id');
      const container = document.getElementById('provider-detail');

      if (!listingId) {
        container.innerHTML = '<p class="text-center text-muted" style="padding:3rem">No service specified. <a href="index.html">Browse services</a></p>';
        return;
      }

      let listing = null;
      let profile = null;

      // Try fetching from API, then fall back to local data
      try {
        listing = await api.fetchListing(listingId);
        if (listing.user_id) {
          try { profile = await api.fetchProfile(listing.user_id); } catch {}
        }
      } catch {
        // Check fallback listings
        const all = await getListings();
        listing = all.find(l => l.id === listingId);
      }

      if (!listing) {
        container.innerHTML = '<p class="text-center text-muted" style="padding:3rem">Service not found. <a href="index.html">Browse services</a></p>';
        return;
      }

      // Update page title and meta
      document.title = `${listing.title} | Jobsy Jamaica`;
      document.querySelector('meta[name="description"]').content = listing.description || '';
      document.getElementById('breadcrumb-title').textContent = listing.title;

      const cat = findCategory(listing.category);
      const icon = cat ? cat.icon : '&#128188;';
      const price = listing.budget
        ? `J$${Number(listing.budget).toLocaleString()} ${listing.currency || 'JMD'}`
        : 'Get Quote';

      container.innerHTML = `
        <div class="tool-detail-header">
          <div class="tool-detail-icon">${icon}</div>
          <div class="tool-detail-info">
            <h1>${escapeHtml(listing.title)}</h1>
            <div class="tool-detail-meta">
              <span>${escapeHtml(listing.category || 'Service')}</span>
              ${listing.parish ? `<span>&#128205; ${escapeHtml(listing.parish)}</span>` : ''}
              <span>&#128176; ${price}</span>
              ${listing.status ? `<span>Status: ${escapeHtml(listing.status)}</span>` : ''}
            </div>
            <div class="tool-detail-actions">
              <a href="contact.html" class="btn btn-primary">Contact Provider</a>
              ${listing.category ? `<a href="category.html?cat=${categorySlug(listing.category)}" class="btn btn-outline">More ${escapeHtml(listing.category)}</a>` : ''}
            </div>
          </div>
        </div>

        <div class="tool-detail-body">
          <div class="tool-detail-main">
            <div class="content-section">
              <h2>About This Service</h2>
              <p>${escapeHtml(listing.description || 'No description available.')}</p>
            </div>

            ${profile ? `
            <div class="content-section">
              <h2>About the Provider</h2>
              <p><strong>${escapeHtml(profile.display_name || 'Provider')}</strong></p>
              ${profile.bio ? `<p>${escapeHtml(profile.bio)}</p>` : ''}
              ${profile.skills && profile.skills.length ? `
                <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem">
                  ${profile.skills.map(s => `<span class="parish-tag" style="font-size:0.8rem;padding:0.3rem 0.8rem">${escapeHtml(s)}</span>`).join('')}
                </div>
              ` : ''}
              ${profile.hourly_rate ? `<p style="margin-top:0.75rem"><strong>Hourly Rate:</strong> J$${Number(profile.hourly_rate).toLocaleString()}</p>` : ''}
            </div>
            ` : ''}

            <div class="content-section" id="similar-section"></div>
          </div>

          <div class="tool-detail-sidebar">
            <div class="sidebar-card">
              <h3>Service Details</h3>
              <p><strong>Category:</strong> ${escapeHtml(listing.category || 'Service')}</p>
              ${listing.parish ? `<p><strong>Location:</strong> ${escapeHtml(listing.parish)}, Jamaica</p>` : ''}
              <p><strong>Price:</strong> ${price}</p>
            </div>

            <div class="cta-box">
              <h3>Need This Service?</h3>
              <p>Download the Jobsy app to connect directly with this provider.</p>
              <a href="contact.html" class="btn btn-white" style="width:100%;justify-content:center">Get Started</a>
            </div>
          </div>
        </div>
      `;

      // Load similar listings
      const similar = document.getElementById('similar-section');
      if (similar && listing.category) {
        const all = await getListings();
        const related = all.filter(l =>
          l.id !== listing.id &&
          (l.category || '').toLowerCase() === (listing.category || '').toLowerCase()
        ).slice(0, 3);
        if (related.length) {
          similar.innerHTML = `
            <h2>Similar Services</h2>
            <div class="tool-grid">${related.map(l => listingCardHTML(l)).join('')}</div>
          `;
        }
      }
    });
  </script>
</body>
</html>
